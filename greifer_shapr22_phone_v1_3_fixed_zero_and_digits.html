<style>

#message{font-size:17px;line-height:1.65;white-space:pre-line}#actions{margin-top:16px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}#actions button{border:1px solid #555;background:#f7f7f7;border-radius:10px;padding:9px 14px;font-weight:700}
#wristGame{display:none;position:fixed;left:50%;bottom:68px;transform:translateX(-50%);width:min(86vw,430px);background:#fffffff2;border:1px solid #888;border-radius:12px;padding:10px 12px;box-shadow:0 6px 20px #0003;z-index:20;pointer-events:none}.meter{height:18px;background:#ddd;border-radius:9px;overflow:hidden;position:relative}.fill{height:100%;width:0%;background:#2c8}.zone{position:absolute;left:42%;width:20%;top:0;bottom:0;border:2px solid #d60;box-sizing:border-box}.hint{font-size:13px;margin-top:8px;color:#555;text-align:center}#lBtn{touch-action:none;user-select:none;-webkit-user-select:none}
#end{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#ffffffcc;z-index:25;font-weight:800}.big{font-size:82px}.mid{font-size:40px;margin-top:8px}#end button{margin-top:18px;font-size:18px;padding:9px 16px;border-radius:10px}
#warn{position:fixed;left:12px;bottom:12px;background:#fff3cd;border:1px solid #fc6;padding:8px 10px;border-radius:8px;font-size:12px;display:none;z-index:12}
@media(max-width:760px){#info{top:8px;font-size:12px;max-width:72vw}#hud{top:58px;left:8px;font-size:12px}#modeBox{top:176px;left:8px;width:62px}#panel{top:54px;right:8px;width:min(92vw,360px)}#panel.collapsed{top:58px;right:8px}#controlBar{bottom:13px}}

<body>
<div id="info">SHAPr22 Phone v1.3：固定初期位置 → STARTでボタン前へ → 「ボタン」で計測開始 → ケータイ把持 → 表裏を整える → 対側手で1〜6を順にタップ → 耳位置へ → リリース位置でL待機 → 青い台へ置く → 「ボタン」で終了。</div>
<div id="hud">TIME: <span id="time">0.0</span><br>PHASE: <span id="phase">READY</span><br>面: <span id="faceName">表</span><br>義手: <span id="armName">前腕</span><br>手首: <span id="wristName">固定</span><br><span id="setStatus" style="color:#999">SET OFF</span></div>
<div id="modeBox">
<div class="title">Phone</div><button id="faceFront" class="on">表</button><button id="faceBack">裏</button>
<div class="title">義手</div><button id="armForearm" class="on">前腕</button><button id="armUpper">上腕</button><button id="armShoulder">肩</button>
<div class="title">手首</div><button id="wristFixed" class="on">固定</button><button id="wristElectric">電動</button>
<button id="resetBtn">RESET</button><button id="setBtn">SET</button>
<div id="calibBox"><button data-cal="TIMER">TIMER</button><button data-cal="PHONE">PHONE</button><button data-cal="HOLD">HOLD</button><button data-cal="TAP">TAP</button><button data-cal="EAR">EAR</button><button data-cal="RELEASE">RELEASE</button><button data-cal="PLACE">PLACE</button></div>
</div>
<div id="controlBar"><button id="lBtn">L</button><button id="startTaskBtn">START</button><button id="timerTaskBtn">ボタン</button></div>
<div id="panel" class="collapsed"><h3>SHAPr22 調整パネル</h3><button id="panelToggle">調</button><div id="panelBody">
<h4>ケータイ</h4>
<label>幅<input id="phoneW" type="range" min="0.18" max="0.48" step="0.005"><span id="phoneWv"></span></label>
<label>高さ<input id="phoneH" type="range" min="0.28" max="0.72" step="0.005"><span id="phoneHv"></span></label>
<label>厚み<input id="phoneT" type="range" min="0.01" max="0.08" step="0.002"><span id="phoneTv"></span></label>
<label>物体X<input id="phoneX" type="range" min="-0.7" max="0.7" step="0.005"><span id="phoneXv"></span></label>
<label>物体Y<input id="phoneY" type="range" min="-0.1" max="0.5" step="0.005"><span id="phoneYv"></span></label>
<label>物体Z<input id="phoneZ" type="range" min="-0.7" max="0.7" step="0.005"><span id="phoneZv"></span></label>
<h4>把持</h4>
<label>G-X<input id="gx" type="range" min="-1.5" max="1.5" step="0.01"><span id="gxv"></span></label>
<label>G-Y<input id="gy" type="range" min="-1.5" max="1.5" step="0.01"><span id="gyv"></span></label>
<label>G-Z<input id="gz" type="range" min="-1.5" max="1.5" step="0.01"><span id="gzv"></span></label>
<label>相対X<input id="gripX" type="range" min="-0.5" max="0.5" step="0.005"><span id="gripXv"></span></label>
<label>相対Z<input id="gripZ" type="range" min="-0.5" max="0.5" step="0.005"><span id="gripZv"></span></label>
<label>回転X<input id="rx" type="range" min="-3.14" max="3.14" step="0.01"><span id="rxv"></span></label>
<label>回転Y<input id="ry" type="range" min="-3.14" max="3.14" step="0.01"><span id="ryv"></span></label>
<label>回転Z<input id="rz" type="range" min="-3.14" max="3.14" step="0.01"><span id="rzv"></span></label>
<label>開き角<input id="openA" type="range" min="-0.2" max="1.0" step="0.01"><span id="openAv"></span></label>
<label>閉じ角<input id="closedA" type="range" min="-0.3" max="0.8" step="0.01"><span id="closedAv"></span></label>
<h4>位置</h4>
<label>耳X<input id="earX" type="range" min="-1.2" max="1.2" step="0.01"><span id="earXv"></span></label>
<label>耳Y<input id="earY" type="range" min="0" max="1.8" step="0.01"><span id="earYv"></span></label>
<label>耳Z<input id="earZ" type="range" min="-1.2" max="1.2" step="0.01"><span id="earZv"></span></label>
<h4>ケータイリリース位置</h4>
<label>相対X<input id="relX" type="range" min="-0.35" max="0.35" step="0.005"><span id="relXv"></span></label>
<label>相対Y<input id="relY" type="range" min="0" max="0.35" step="0.005"><span id="relYv"></span></label>
<label>相対Z<input id="relZ" type="range" min="-0.35" max="0.35" step="0.005"><span id="relZv"></span></label>
<label>回転X<input id="relRX" type="range" min="-1.57" max="1.57" step="0.01"><span id="relRXv"></span></label>
<label>回転Y<input id="relRY" type="range" min="-3.14" max="3.14" step="0.01"><span id="relRYv"></span></label>
<label>回転Z<input id="relRZ" type="range" min="-1.57" max="1.57" step="0.01"><span id="relRZv"></span></label>
<h4>電動リスト</h4>
<label>適正開始ms<input id="holdMin" type="range" min="500" max="2500" step="50"><span id="holdMinv"></span></label>
<label>適正終了ms<input id="holdMax" type="range" min="800" max="3500" step="50"><span id="holdMaxv"></span></label>
<label>誤作動率<input id="malProb" type="range" min="0" max="1" step="0.01"><span id="malProbv"></span></label>
<h4>画面被覆確率</h4>
<label>右1個<input id="coverRight" type="range" min="0" max="1" step="0.01"><span id="coverRightv"></span></label>
<label>左右2個<input id="coverTwo" type="range" min="0" max="1" step="0.01"><span id="coverTwov"></span></label>
<label>再把持<input id="regraspProb" type="range" min="0" max="1" step="0.01"><span id="regraspProbv"></span></label>
<button id="saveAll">保存</button><button id="resetAll">初期値</button><button id="copyAll">設定コピー</button><div id="coords"></div>
</div></div>
<div id="warn"></div>
<div id="wristGame"><div class="meter"><div class="fill" id="meterFill"></div><div class="zone"></div></div><div class="hint">Lを強く長く押し、適正範囲で離してください。</div></div><div id="modal"><div id="card"><div id="message"></div><div id="actions"></div></div></div>
<div id="end"><div class="big" id="finalTime">0.0s</div><div class="mid">END</div><button id="restartBtn">もう一度</button></div>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
const STORAGE_KEY='greifer_shapr22_phone_v1_3_config';
const FLOOR_Y=-0.35;
// 全SHAPr共通の固定初期位置。CONFIG・SET・保存値から独立し、毎回同じ絶対座標へ戻す。
const FIXED_ZERO_POSITION=Object.freeze([0.94,-0.28,0.63]);
const FIXED_ZERO_ROTATION=Object.freeze([0,0,0]);
const DEFAULT_CONFIG={
 phoneWidth:0.30,phoneHeight:0.52,phoneThickness:0.035,
 phonePosition:[0.34,0.02,-0.10],
 graspLocal:[0.38,0.37,-0.10],phoneGripOffset:[0.13,0.06],
 gripperRot:[-0.48,1.28,-0.28],openAngle:0.44,closedAngle:0.05,
 timerButton:[-0.36,0.08],earPosition:[0.52,0.62,0.02],liftHeight:0.18,transitClearance:0.05,
 releaseOffset:[-0.045,0.055,0.0],releaseRot:[0,0,0.30],
 electricWrist:{holdMinMs:1200,holdMaxMs:1550,malfunctionProbability:0.25},
 screenCover:{coverRightProbability:0.333,coverTwoProbability:0.111,regraspProbability:0.333}
};
const clone=o=>JSON.parse(JSON.stringify(o));
function deepMerge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k]))a[k]=deepMerge(a[k]||{},b[k]);else a[k]=b[k]}return a}
function loadConfig(){try{return deepMerge(clone(DEFAULT_CONFIG),JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'))}catch{return clone(DEFAULT_CONFIG)}}
let config=loadConfig(),face='front',arm='forearm',wrist='fixed';
let state='ready',moving=false,timerRunning=false,startTime=0,angle=config.openAngle,targetAngle=config.openAngle,phoneAttached=false,calibration=false,calState='TIMER';
let currentTap=1,covered=new Set(),regraspCount=0,wristHoldStart=0,wristGameActive=false,wristGameToken=0,electricWristReady=false;
const scene=new THREE.Scene();scene.background=new THREE.Color(0xeef8ee);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.01,100);camera.position.set(0,1.15,3);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(devicePixelRatio);document.body.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);controls.target.set(0,.18,0);controls.enableDamping=true;
scene.add(new THREE.AmbientLight(0xffffff,1.8));const dl=new THREE.DirectionalLight(0xffffff,2.5);dl.position.set(3,5,4);scene.add(dl);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(7,5),new THREE.MeshStandardMaterial({color:0xf2f2f2}));ground.rotation.x=-Math.PI/2;ground.position.y=FLOOR_Y;scene.add(ground);
const root=new THREE.Group(),contraRoot=new THREE.Group(),jawPivot=new THREE.Group(),contraJawPivot=new THREE.Group();scene.add(root,contraRoot);root.add(jawPivot);contraRoot.add(contraJawPivot);
let normalized=false,phone=null,board=null,timerButtonMesh=null,screenCanvas=null,screenTexture=null;
const loader=new GLTFLoader();
const $=id=>document.getElementById(id);
function setPhase(x){$('phase').textContent=x}function showWarn(x){$('warn').textContent=x;$('warn').style.display='block';setTimeout(()=>$('warn').style.display='none',2500)}
function modeUI(){$('faceName').textContent=face==='front'?'表':'裏';$('armName').textContent=arm==='forearm'?'前腕':arm==='upper'?'上腕':'肩';$('wristName').textContent=wrist==='fixed'?'固定':'電動';['front','back'].forEach(x=>$('face'+(x==='front'?'Front':'Back')).classList.toggle('on',face===x));['forearm','upper','shoulder'].forEach(x=>$('arm'+(x==='forearm'?'Forearm':x==='upper'?'Upper':'Shoulder')).classList.toggle('on',arm===x));$('wristFixed').classList.toggle('on',wrist==='fixed');$('wristElectric').classList.toggle('on',wrist==='electric')}
function makeBoard(){if(board)scene.remove(board);board=new THREE.Group();scene.add(board);const blue=new THREE.MeshStandardMaterial({color:0x1f86d1,roughness:.45}),dark=new THREE.MeshStandardMaterial({color:0x444});const base=new THREE.Mesh(new THREE.BoxGeometry(1.45,.06,.9),blue);base.position.set(0,FLOOR_Y+.03,-.15);board.add(base);const timerBase=new THREE.Mesh(new THREE.BoxGeometry(.26,.045,.18),dark);timerBase.position.set(config.timerButton[0],FLOOR_Y+.052,config.timerButton[1]);board.add(timerBase);timerButtonMesh=new THREE.Mesh(new THREE.CylinderGeometry(.055,.055,.025,32),new THREE.MeshStandardMaterial({color:0xff3333}));timerButtonMesh.position.set(config.timerButton[0],FLOOR_Y+.095,config.timerButton[1]);board.add(timerButtonMesh);const phonePad=new THREE.Mesh(new THREE.BoxGeometry(config.phoneWidth*1.25,.014,config.phoneHeight*1.15),new THREE.MeshStandardMaterial({color:0x777}));phonePad.position.set(config.phonePosition[0],FLOOR_Y+.075,config.phonePosition[2]);board.add(phonePad)}
function updateScreenTexture(){
  if(!screenCanvas){screenCanvas=document.createElement('canvas');screenCanvas.width=360;screenCanvas.height=600;screenTexture=new THREE.CanvasTexture(screenCanvas);screenTexture.flipY=false}
  const c=screenCanvas.getContext('2d');c.setTransform(1,0,0,1,0,0);c.clearRect(0,0,360,600);c.fillStyle='#111';c.fillRect(0,0,360,600);c.font='bold 62px system-ui';c.textAlign='center';c.textBaseline='middle';
  // 画面上の配置は上段5・6、中段3・4、下段1・2。PlaneをX反転して文字の鏡像を補正するため、Canvas側の列も逆に描く。
  const layout=[[5,6],[3,4],[1,2]];
  for(let row=0;row<3;row++)for(let col=0;col<2;col++){
    const i=layout[row][col];const x=270-col*180,y=100+row*200;
    c.fillStyle=covered.has(i)?'#333':'#dfefff';c.fillRect(x-62,y-62,124,124);c.fillStyle=covered.has(i)?'#777':'#111';
    // Planeの上下反転を相殺するため、数字だけを各セル中心で180度回転。配置自体は変更しない。
    c.save();c.translate(x,y);c.rotate(Math.PI);c.fillText(String(i),0,0);c.restore();
  }
  screenTexture.needsUpdate=true;
}
function makePhone(){if(phone){if(phone.parent)phone.parent.remove(phone)}phone=new THREE.Group();const back=new THREE.Mesh(new THREE.BoxGeometry(config.phoneWidth,config.phoneThickness,config.phoneHeight),new THREE.MeshStandardMaterial({color:0x777,roughness:.35}));phone.add(back);updateScreenTexture();const screen=new THREE.Mesh(new THREE.PlaneGeometry(config.phoneWidth*.92,config.phoneHeight*.92),new THREE.MeshBasicMaterial({map:screenTexture}));screen.rotation.x=-Math.PI/2;screen.scale.x=-1;screen.position.y=config.phoneThickness/2+.001;phone.add(screen);phone.rotation.y=face==='front'?0:Math.PI;phone.position.set(config.phonePosition[0],FLOOR_Y+config.phoneThickness/2+.08,config.phonePosition[2]);scene.add(phone)}
function normalize(){if(normalized)return;const box=new THREE.Box3().setFromObject(root);const s=box.getSize(new THREE.Vector3());const m=Math.max(s.x,s.y,s.z);if(m>0){root.scale.setScalar(.75/m);contraRoot.scale.copy(root.scale);normalized=true}}
async function loadModels(){try{const b=await loader.loadAsync('Body.glb'),j=await loader.loadAsync('LeftJaw.glb');root.add(b.scene);jawPivot.add(j.scene);const b2=b.scene.clone(true),j2=j.scene.clone(true);contraRoot.add(b2);contraJawPivot.add(j2);contraRoot.scale.x*=-1;[root,contraRoot].forEach(r=>r.traverse(o=>{if(o.isMesh)o.material=new THREE.MeshStandardMaterial({color:0x101010,roughness:.35,metalness:.4})}));normalize();makeBoard();makePhone();resetTask()}catch(e){console.error(e);showWarn('Body.glb と LeftJaw.glb をHTMLと同じフォルダに置いてください。')}}
function applyRot(r=root,rot=config.gripperRot){r.rotation.set(-Math.PI/2+rot[0],rot[1],rot[2])}
function graspWorld(r=root){const p=new THREE.Vector3(...config.graspLocal);r.localToWorld(p);return p}
function rootTargetFor(world,r=root){return r.position.clone().add(world.clone().sub(graspWorld(r)))}
function phoneCenter(){return new THREE.Vector3(config.phonePosition[0],FLOOR_Y+config.phoneThickness/2+.08,config.phonePosition[2])}
function phoneGripTarget(){return phoneCenter().clone().add(new THREE.Vector3(config.phoneGripOffset[0],0,config.phoneGripOffset[1]))}
function releasePosePosition(){return phoneCenter().clone().add(new THREE.Vector3(...config.releaseOffset))}
function releasePoseRotation(){const baseY=face==='front'?0:Math.PI;return new THREE.Euler(config.releaseRot[0],baseY+config.releaseRot[1],config.releaseRot[2])}
function releaseGripTarget(){return releasePosePosition().clone().add(new THREE.Vector3(config.phoneGripOffset[0],0,config.phoneGripOffset[1]))}
function timerPoint(){return new THREE.Vector3(config.timerButton[0],FLOOR_Y+.13,config.timerButton[1])}
function setJaw(v){targetAngle=v}function updateJaw(){angle+=(targetAngle-angle)*.08;jawPivot.rotation.z=angle}
function moveRoot(to,ms,done){moving=true;const from=root.position.clone(),t0=performance.now();function f(){const t=Math.min(1,(performance.now()-t0)/ms),u=t*t*(3-2*t);root.position.lerpVectors(from,to,u);if(t<1)requestAnimationFrame(f);else{moving=false;done?.()}}f()}
function moveRotate(toPos,toRot,ms,done){moving=true;const fp=root.position.clone(),fr=root.rotation.clone(),t0=performance.now();function f(){const t=Math.min(1,(performance.now()-t0)/ms),u=t*t*(3-2*t);root.position.lerpVectors(fp,toPos,u);root.rotation.set(fr.x+(toRot.x-fr.x)*u,fr.y+(toRot.y-fr.y)*u,fr.z+(toRot.z-fr.z)*u);if(t<1)requestAnimationFrame(f);else{moving=false;done?.()}}f()}
function zeroPose(){
  root.position.set(FIXED_ZERO_POSITION[0],FIXED_ZERO_POSITION[1],FIXED_ZERO_POSITION[2]);
  root.rotation.set(FIXED_ZERO_ROTATION[0],FIXED_ZERO_ROTATION[1],FIXED_ZERO_ROTATION[2]);
  setJaw(config.openAngle);
}
function resetTask(){state='ready';moving=false;timerRunning=false;startTime=0;currentTap=1;covered.clear();regraspCount=0;phoneAttached=false;wristGameActive=false;wristHoldStart=0;wristGameToken++;$('wristGame').style.display='none';electricWristReady=false;$('time').textContent='0.0';$('end').style.display='none';$('timerTaskBtn').classList.remove('running');$('startTaskBtn').classList.remove('done');makeBoard();makePhone();zeroPose();contraRoot.visible=false;setPhase('READY')}
function showModal(msg,buttons=[]){$('message').textContent=msg;$('actions').innerHTML='';buttons.forEach(b=>{const x=document.createElement('button');x.textContent=b.label;x.onclick=b.onClick;$('actions').appendChild(x)});$('modal').style.display='flex'}function hideModal(){$('modal').style.display='none'}
function chooseCoverage(isRegrasp=false){covered.clear();if(isRegrasp&&regraspCount>0&&Math.random()>config.screenCover.regraspProbability){updateScreenTexture();return}const r=Math.random();if(r<config.screenCover.coverTwoProbability){const row=Math.floor(Math.random()*3);covered.add(row*2+1);covered.add(row*2+2)}else if(r<config.screenCover.coverTwoProbability+config.screenCover.coverRightProbability){const rights=[2,4,6];covered.add(rights[Math.floor(Math.random()*3)])}updateScreenTexture()}
function startMove(){if(moving||state!=='ready')return;const safe=new THREE.Vector3(root.position.x,root.position.y+config.transitClearance,root.position.z);moveRoot(safe,450,()=>moveRoot(rootTargetFor(timerPoint()),900,()=>{state='timer_start';setPhase('PRESS BUTTON');$('startTaskBtn').classList.add('done')}))}
function timerButtonAction(){if(moving)return;if(state==='timer_start'){timerRunning=true;startTime=performance.now();$('timerTaskBtn').classList.add('running');state='to_phone';setPhase('TO PHONE');const lift=root.position.clone().add(new THREE.Vector3(0,config.transitClearance,0));moveRoot(lift,400,()=>{applyRot();const target=rootTargetFor(phoneGripTarget());moveRoot(target,1100,()=>{state='ready_grip';setPhase('GRIP PHONE')})})}else if(state==='timer_end'){timerRunning=false;const t=(performance.now()-startTime)/1000;$('finalTime').textContent=t.toFixed(1)+'s';$('end').style.display='flex';state='end';setPhase('END');$('timerTaskBtn').classList.remove('running')}}
function startWristGame(){
  wristGameToken++;
  wristGameActive=true;
  wristHoldStart=0;
  $('meterFill').style.width='0%';
  $('wristGame').style.display='block';
  setPhase('ELECTRIC WRIST');
}
function stopWristGame(){
  wristGameActive=false;
  wristHoldStart=0;
  wristGameToken++;
  $('wristGame').style.display='none';
}
function finishWristHold(ms){
  stopWristGame();
  if(ms<config.electricWrist.holdMinMs){
    showModal('収縮が短く、リストは回転しませんでした。もう一度試してください。',[{label:'再試行',onClick:()=>{hideModal();startWristGame()}}]);return;
  }
  if(ms>config.electricWrist.holdMaxMs||Math.random()<config.electricWrist.malfunctionProbability){
    const problems=['回転不足','回り過ぎ','逆方向への誤作動'];
    showModal('電動リストが誤作動しました：'+problems[Math.floor(Math.random()*problems.length)]+'。もう一度試してください。',[{label:'再試行',onClick:()=>{hideModal();startWristGame()}}]);return;
  }
  electricWristReady=true;
  setPhase('WRIST READY');
  showWarn('電動リストの回外準備が完了しました');
  if(phoneAttached&&face==='back'){
    phone.rotation.y=0;
    state='tap_prepare';
    beginTapping();
  }
}
function onLDown(e){
  if(wristGameActive){
    if(wristHoldStart)return;
    if(e?.pointerId!=null){try{$('lBtn').setPointerCapture(e.pointerId)}catch{}}
    wristHoldStart=performance.now();
    const token=wristGameToken;
    const loop=()=>{
      if(token!==wristGameToken||!wristGameActive||!wristHoldStart)return;
      const ms=performance.now()-wristHoldStart;
      $('meterFill').style.width=Math.min(100,ms/config.electricWrist.holdMaxMs*100)+'%';
      requestAnimationFrame(loop);
    };
    loop();return;
  }
  onL();
}
function onLUp(e){
  if(wristGameActive&&wristHoldStart){
    const ms=performance.now()-wristHoldStart;
    wristHoldStart=0;
    if(e?.pointerId!=null){try{$('lBtn').releasePointerCapture(e.pointerId)}catch{}}
    finishWristHold(ms);
  }
}
function animatePhonePose(toPos,toRot,ms,done){
  const fromPos=phone.position.clone(),fromRot=phone.rotation.clone(),t0=performance.now();
  function step(){
    const t=Math.min(1,(performance.now()-t0)/ms),u=t*t*(3-2*t);
    phone.position.lerpVectors(fromPos,toPos,u);
    phone.rotation.set(fromRot.x+(toRot.x-fromRot.x)*u,fromRot.y+(toRot.y-fromRot.y)*u,fromRot.z+(toRot.z-fromRot.z)*u);
    if(t<1)requestAnimationFrame(step);else done?.();
  }
  step();
}
function movePhoneToReleasePosition(done){
  const rp=releasePosePosition(),rr=releasePoseRotation();
  animatePhonePose(rp,rr,700,done);
}
function prepareReleasePosition(){
  state='return_phone';setPhase('RETURN TO RELEASE');
  const above=releaseGripTarget().clone().add(new THREE.Vector3(0,config.liftHeight,0));
  moveRoot(rootTargetFor(above),1200,()=>moveRoot(rootTargetFor(releaseGripTarget()),650,()=>{
    scene.attach(phone);phoneAttached=false;
    movePhoneToReleasePosition(()=>{state='at_release';setPhase('RELEASE POSITION - L');});
  }));
}
function finishPhonePlacement(){
  state='placing';setPhase('SLIDE ON BOARD');moving=true;
  const finalPos=phoneCenter();const baseY=face==='front'?0:Math.PI;
  animatePhonePose(finalPos,new THREE.Euler(0,baseY,0),650,()=>{
    moving=false;setJaw(config.openAngle);state='to_timer_end';
    const up=root.position.clone().add(new THREE.Vector3(0,config.transitClearance,0));
    moveRoot(up,450,()=>moveRoot(rootTargetFor(timerPoint()),1000,()=>{state='timer_end';setPhase('PRESS BUTTON')}));
  });
}
function onL(){if(moving)return;if(state==='ready_grip'){setJaw(config.closedAngle);setTimeout(()=>{root.attach(phone);phoneAttached=true;chooseCoverage(false);if(face==='back'){if(arm!=='forearm'){showModal('この義手条件では、健側手で肘や手首を回さない限り、裏向きのケータイを画面側へ返せません。上腕義手・肩義手ではこの片手課題を続行できません。',[{label:'最初から',onClick:()=>{hideModal();resetTask()}}]);return}if(wrist==='fixed'){showModal('画面を上に向けるには回外が必要です。固定手首のグライファーでは、健側手で義手側の肘または手首を回さない限り続行できません。',[{label:'最初から',onClick:()=>{hideModal();resetTask()}}]);return}if(!electricWristReady){startWristGame();return}phone.rotation.y=0}beginTapping()},500)}else if(state==='tapping'){timerRunning=false;showModal('対側手で画面を操作している途中にLを押したため、ケータイ保持が崩れました。最初からやり直します。',[{label:'最初から',onClick:()=>{hideModal();resetTask()}}])}else if(state==='at_release'){finishPhonePlacement()}}
function beginTapping(){state='tap_prepare';setPhase('TURN SCREEN');const p=root.position.clone();const r=new THREE.Euler(root.rotation.x,root.rotation.y,root.rotation.z+Math.PI/2);moveRotate(p,r,700,()=>{state='tapping';setPhase('TAP 1→6');contraRoot.visible=true;contraRoot.position.set(-.55,.35,.15);contraRoot.rotation.set(root.rotation.x,-root.rotation.y,-root.rotation.z);currentTap=1;tapNext()})}
function tapNext(){if(state!=='tapping')return;if(currentTap>6){contraRoot.visible=false;moveToEar();return}if(covered.has(currentTap)){regraspCount++;showModal('番号 '+currentTap+' がグライファーで覆われ、押せません。いったん置いて持ち直します。タイマーは継続します。',[{label:'持ち直す',onClick:()=>{hideModal();regraspPhone()}}]);return}const col=(currentTap-1)%2,row=2-Math.floor((currentTap-1)/2);const local=new THREE.Vector3((col?1:-1)*config.phoneWidth*.23,config.phoneThickness/2+.08,(1-row)*config.phoneHeight*.28);phone.localToWorld(local);const target=rootTargetFor(local,contraRoot);moveRootGeneric(contraRoot,target,280,()=>{contraRoot.position.y-=.025;setTimeout(()=>{contraRoot.position.y+=.025;currentTap++;setTimeout(tapNext,160)},120)})}
function moveRootGeneric(r,to,ms,done){const from=r.position.clone(),t0=performance.now();function f(){const t=Math.min(1,(performance.now()-t0)/ms),u=t*t*(3-2*t);r.position.lerpVectors(from,to,u);if(t<1)requestAnimationFrame(f);else done?.()}f()}
function regraspPhone(){
  state='regrasp';const returnPos=root.position.clone(),returnRot=root.rotation.clone();
  scene.attach(phone);phoneAttached=false;setJaw(config.openAngle);
  movePhoneToReleasePosition(()=>{
    const up=root.position.clone().add(new THREE.Vector3(0,config.transitClearance,0));
    moveRoot(up,450,()=>{applyRot();moveRoot(rootTargetFor(releaseGripTarget()),850,()=>{
      setJaw(config.closedAngle);setTimeout(()=>{root.attach(phone);phoneAttached=true;chooseCoverage(true);
        moveRotate(returnPos,returnRot,850,()=>{state='tapping';setPhase('TAP '+currentTap+'→6');tapNext()});
      },450);
    })});
  });
}
function moveToEar(){state='to_ear';setPhase('TO EAR');const lift=root.position.clone().add(new THREE.Vector3(0,config.liftHeight,0));moveRoot(lift,650,()=>moveRoot(rootTargetFor(new THREE.Vector3(...config.earPosition)),1300,()=>{state='at_ear';setPhase('EAR');setTimeout(prepareReleasePosition,900)}))}
function setCalibration(s){calState=s;document.querySelectorAll('#calibBox button').forEach(b=>b.classList.toggle('on',b.dataset.cal===s));makeBoard();makePhone();applyRot();if(s==='TIMER'){root.position.copy(rootTargetFor(timerPoint()))}else if(s==='PHONE'||s==='HOLD'){root.position.copy(rootTargetFor(phoneGripTarget()));setJaw(s==='HOLD'?config.closedAngle:config.openAngle)}else if(s==='TAP'){root.position.copy(rootTargetFor(phoneGripTarget()));phone.rotation.y=0;contraRoot.visible=true}else if(s==='EAR'){root.position.copy(rootTargetFor(new THREE.Vector3(...config.earPosition)))}else if(s==='RELEASE'){scene.attach(phone);phone.position.copy(releasePosePosition());phone.rotation.copy(releasePoseRotation());root.position.copy(rootTargetFor(releaseGripTarget()));setJaw(config.closedAngle)}else if(s==='PLACE'){phone.position.copy(phoneCenter());phone.rotation.set(0,face==='front'?0:Math.PI,0);root.position.copy(rootTargetFor(phoneGripTarget()));}}
function toggleCalibration(){calibration=!calibration;$('calibBox').style.display=calibration?'block':'none';$('setStatus').textContent=calibration?'SET '+calState:'SET OFF';if(calibration)setCalibration(calState)}
$('faceFront').onclick=()=>{face='front';modeUI();resetTask()};$('faceBack').onclick=()=>{face='back';modeUI();resetTask()};$('armForearm').onclick=()=>{arm='forearm';modeUI();resetTask()};$('armUpper').onclick=()=>{arm='upper';modeUI();resetTask()};$('armShoulder').onclick=()=>{arm='shoulder';modeUI();resetTask()};$('wristFixed').onclick=()=>{wrist='fixed';modeUI();resetTask()};$('wristElectric').onclick=()=>{wrist='electric';modeUI();resetTask();startWristGame()};$('resetBtn').onclick=resetTask;$('setBtn').onclick=toggleCalibration;document.querySelectorAll('#calibBox button').forEach(b=>b.onclick=()=>setCalibration(b.dataset.cal));$('startTaskBtn').onclick=startMove;$('timerTaskBtn').onclick=timerButtonAction;$('lBtn').addEventListener('pointerdown',onLDown);$('lBtn').addEventListener('pointerup',onLUp);$('lBtn').addEventListener('pointercancel',onLUp);$('lBtn').addEventListener('pointerleave',e=>{if(wristGameActive&&wristHoldStart&&e.buttons===0)onLUp(e)});addEventListener('keydown',e=>{if((e.key==='l'||e.key==='L')&&!e.repeat)onLDown()});addEventListener('keyup',e=>{if(e.key==='l'||e.key==='L')onLUp()});$('restartBtn').onclick=resetTask;
const ids=['phoneW','phoneH','phoneT','phoneX','phoneY','phoneZ','gx','gy','gz','gripX','gripZ','rx','ry','rz','openA','closedA','earX','earY','earZ','relX','relY','relZ','relRX','relRY','relRZ','holdMin','holdMax','malProb','coverRight','coverTwo','regraspProb'];
const map={phoneW:['phoneWidth'],phoneH:['phoneHeight'],phoneT:['phoneThickness'],phoneX:['phonePosition',0],phoneY:['phonePosition',1],phoneZ:['phonePosition',2],gx:['graspLocal',0],gy:['graspLocal',1],gz:['graspLocal',2],gripX:['phoneGripOffset',0],gripZ:['phoneGripOffset',1],rx:['gripperRot',0],ry:['gripperRot',1],rz:['gripperRot',2],openA:['openAngle'],closedA:['closedAngle'],earX:['earPosition',0],earY:['earPosition',1],earZ:['earPosition',2],relX:['releaseOffset',0],relY:['releaseOffset',1],relZ:['releaseOffset',2],relRX:['releaseRot',0],relRY:['releaseRot',1],relRZ:['releaseRot',2],holdMin:['electricWrist','holdMinMs'],holdMax:['electricWrist','holdMaxMs'],malProb:['electricWrist','malfunctionProbability'],coverRight:['screenCover','coverRightProbability'],coverTwo:['screenCover','coverTwoProbability'],regraspProb:['screenCover','regraspProbability']};
function get(path,obj=config){let x=obj;for(const k of path)x=x[k];return x}function set(path,v){let x=config;for(let i=0;i<path.length-1;i++)x=x[path[i]];x[path.at(-1)]=v}
function wrap(){ids.forEach(id=>{const e=$(id),w=document.createElement('span');w.className='rangeWrap';e.parentNode.insertBefore(w,e);w.appendChild(e);const d=document.createElement('span');d.className='initialDot';d.id=id+'Dot';w.appendChild(d)})}
function markers(){ids.forEach(id=>{const e=$(id),d=$(id+'Dot'),v=get(map[id],DEFAULT_CONFIG),mn=+e.min,mx=+e.max;d.style.left=Math.max(0,Math.min(100,(v-mn)/(mx-mn)*100))+'%'})}
function sync(){ids.forEach(id=>{const v=get(map[id]);$(id).value=v;$(id+'v').textContent=(id==='holdMin'||id==='holdMax')?Math.round(v):Number(v).toFixed(3)});$('coords').textContent='const CONFIG = '+JSON.stringify(config,null,2)+';'}
wrap();markers();sync();ids.forEach(id=>$(id).addEventListener('input',e=>{set(map[id],+e.target.value);sync();if(calibration)setCalibration(calState);else resetTask()}));$('saveAll').onclick=()=>{localStorage.setItem(STORAGE_KEY,JSON.stringify(config));alert('保存しました')};$('resetAll').onclick=()=>{config=clone(DEFAULT_CONFIG);localStorage.removeItem(STORAGE_KEY);sync();resetTask()};$('copyAll').onclick=async()=>{await navigator.clipboard.writeText('const CONFIG = '+JSON.stringify(config,null,2)+';');alert('コピーしました')};$('panelToggle').onclick=()=>{$('panel').classList.toggle('collapsed');$('panelToggle').textContent=$('panel').classList.contains('collapsed')?'調':'閉じる'};
function animate(){requestAnimationFrame(animate);controls.update();updateJaw();if(timerRunning)$('time').textContent=((performance.now()-startTime)/1000).toFixed(1);renderer.render(scene,camera)}animate();addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});modeUI();loadModels();
</script>
